<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header" role="banner">
    <div class="header-left">
      <img src="../icons/icon32.png" alt="PromptBox" class="header-icon">
      <h1 class="header-title">PromptBox</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" id="add-category-btn" aria-label="Yeni kategori ekle">+ Kategori</button>
      <button class="btn btn-primary btn-sm" id="add-prompt-btn" aria-label="Yeni prompt ekle">+ Prompt</button>
      <div class="dropdown-wrapper">
        <button class="btn-icon" id="menu-btn" title="Menü" aria-label="Menü" aria-haspopup="true" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
        <div class="dropdown-menu hidden" id="dropdown-menu" role="menu">
          <button class="dropdown-item" id="export-pdf-btn" role="menuitem">PDF Olarak İndir</button>
          <button class="dropdown-item" id="export-json-btn" role="menuitem">JSON Yedekle</button>
          <button class="dropdown-item" id="import-json-btn" role="menuitem">JSON Geri Yükle</button>
        </div>
      </div>
      <input type="file" id="import-file-input" accept=".json" class="hidden" aria-hidden="true">
      <button class="btn-icon" id="theme-toggle-btn" title="Tema Değiştir" aria-label="Tema değiştir">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon-light" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon-dark" style="display:none;" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Add Category Form (hidden by default) -->
  <div class="add-category-form hidden" id="add-category-form" role="form" aria-label="Yeni kategori formu">
    <input type="text" class="input" id="new-category-input" placeholder="Kategori adı..." aria-label="Kategori adı">
    <div class="form-actions">
      <button class="btn btn-secondary btn-sm" id="cancel-category-btn">Vazgeç</button>
      <button class="btn btn-primary btn-sm" id="save-category-btn">Oluştur</button>
    </div>
  </div>

  <!-- Add Prompt Form (hidden by default) -->
  <div class="add-prompt-form hidden" id="add-prompt-form" role="form" aria-label="Yeni prompt formu">
    <input type="text" class="input" id="prompt-title-input" placeholder="Prompt başlığı (opsiyonel)..." aria-label="Prompt başlığı">
    <textarea class="input" id="prompt-text-input" rows="4" placeholder="Prompt metnini yazın veya yapıştırın..." aria-label="Prompt metni"></textarea>
    <select class="select" id="prompt-category-select" aria-label="Kategori seçin"></select>
    <div class="form-actions">
      <button class="btn btn-secondary btn-sm" id="cancel-prompt-btn">Vazgeç</button>
      <button class="btn btn-primary btn-sm" id="save-prompt-btn">Kaydet</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-bar" role="search">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M7 12A5 5 0 107 2a5 5 0 000 10zM14 14l-3.5-3.5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" class="search-input" id="search-input" placeholder="Prompt ara..." aria-label="Prompt ara">
  </div>

  <!-- Categories -->
  <nav class="categories" id="categories-container" role="tablist" aria-label="Kategoriler">
    <!-- Filled by JS -->
  </nav>

  <!-- Prompts List -->
  <main class="prompts" id="prompts-container" role="list" aria-label="Prompt listesi">
    <!-- Filled by JS -->
  </main>

  <!-- Empty State -->
  <div class="empty-state hidden" id="empty-state" role="status">
    <div class="empty-icon" aria-hidden="true">📋</div>
    <p>Henüz prompt eklenmemiş.</p>
    <p class="empty-hint">Yukarıdaki <strong>+ Prompt</strong> butonuyla veya bir web sayfasında metin seçip sağ tıklayarak ekleyebilirsiniz.</p>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
